# ============================================================
# Proxmox_tkcdc_manager - Environment Configuration
# ============================================================

# ------------------------------------------------------------
# PVE Cluster Node Settings
# NODE_LIST: PVE node names, used for display and node identity
# EXECUTE_NODE: The node this script runs on (local execution)
# NODE_IP_MAP: IP address for each node (used for SSH/SCP)
#   Keys must match NODE_LIST entries exactly
#   Leave empty to use node names directly (requires DNS/hosts)
# ------------------------------------------------------------
NODE_LIST=('pve1' 'pve2' 'pve3')
export EXECUTE_NODE="pve1"
NODE_IP_MAP=(['pve1']='172.20.7.60' ['pve2']='172.20.7.61' ['pve3']='172.20.7.62')

# ------------------------------------------------------------
# VM Count & Identity Settings
# VMID_START ~ VMID_END : VMID range (inclusive)
#   → Number of VMs = VMID_END - VMID_START + 1
# VM_NAME_PREFIX       : Hostname prefix, e.g. tkcdc → tkcdc-01, tkcdc-02
# ------------------------------------------------------------
export VMID_START=900
export VMID_END=904
export VM_NAME_PREFIX="tkcdc"

# ------------------------------------------------------------
# VM Network Settings
# VM_NET_PREFIX : First 3 octets, e.g. 192.168.61
# VM_IP_START   : Last octet of the first VM IP
#   → IPs will be: VM_NET_PREFIX.VM_IP_START, ...+1, ...+2 ...
# NETMASK       : Subnet mask
# GATEWAY       : Default gateway
# NAMESERVER    : DNS server
# BRIDGE        : PVE bridge device
# ------------------------------------------------------------
export VM_NET_PREFIX="192.168.61"
export VM_IP_START=31
export NETMASK="24"
export GATEWAY="192.168.61.1"
export NAMESERVER="8.8.8.8"
export BRIDGE="vmbr0"

# ------------------------------------------------------------
# VM Hardware Settings
# ------------------------------------------------------------
export CPU_SOCKET="1"
export CPU_CORE="2"
export CPU_TYPE="host"
export MEM="4096"
export DISK="50"

# ------------------------------------------------------------
# Storage Settings
# STORAGE: PVE storage name for VM disks and cloud-init
#   Common values: local-lvm, local, ceph, nfs-storage
# ------------------------------------------------------------
export STORAGE="local-lvm"

# ------------------------------------------------------------
# OS Image Settings
# IMAGE_URL  : Ubuntu cloud image download URL
# IMAGE_NAME : Local filename for the downloaded image
# IMAGE_DIR  : Directory to store downloaded image
# ------------------------------------------------------------
export IMAGE_URL="https://cloud-images.ubuntu.com/noble/current/noble-server-cloudimg-amd64.img"
export IMAGE_NAME="noble-server-cloudimg-amd64.img"
export IMAGE_DIR="/var/lib/vz/template/iso"

# ------------------------------------------------------------
# Cloud-Init User Settings
# VM_USER     : Default sudoer username (change as needed)
# VM_PASSWORD : Default password for VM_USER
# SSH_KEY     : Path to SSH public key (leave empty to skip)
# ------------------------------------------------------------
export VM_USER="bigred"
export VM_PASSWORD="bigred"
export SSH_KEY=""

# ------------------------------------------------------------
# Cloud-Init Snippet Storage
# SNIPPET_DIR     : Directory to store cloud-init YAML files
# SNIPPET_STORAGE : PVE storage name that serves snippets
#   Must have "snippets" content type enabled
# ------------------------------------------------------------
export SNIPPET_DIR="/var/lib/vz/snippets"
export SNIPPET_STORAGE="local"

# ------------------------------------------------------------
# xRDP Installer Settings
# XRDP_INSTALLER_URL     : xrdp-installer script download URL
# XRDP_INSTALLER_VERSION : Version string used in filename
# ------------------------------------------------------------
export XRDP_INSTALLER_VERSION="1.5.4"
export XRDP_INSTALLER_URL="https://www.c-nergy.be/downloads/xRDP/xrdp-installer-${XRDP_INSTALLER_VERSION}.zip"
